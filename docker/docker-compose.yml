# Compose reads a sibling .env file automatically. Copy .env.example to .env
# and edit it before running `docker compose up`. For a dev-only stack the
# defaults below work without any .env at all.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-clipshare}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clipshare123}
      POSTGRES_DB: ${DB_NAME:-clipshare}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - clipshare
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clipshare}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ACCESS_KEY:-clipshare}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_SECRET_KEY:-clipshare123}
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - clipshare
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    user: "10001:10001"

  api:
    build:
      context: ../apps/server
      dockerfile: Dockerfile
    environment:
      ENV: ${ENV:-development}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-http://localhost:8080}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-clipshare}
      DB_PASSWORD: ${DB_PASSWORD:-clipshare123}
      DB_NAME: ${DB_NAME:-clipshare}
      DB_SSLMODE: disable

      RUSTFS_ENDPOINT: rustfs:9000
      RUSTFS_PUBLIC_ENDPOINT: ${RUSTFS_PUBLIC_ENDPOINT:-}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-clipshare}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-clipshare123}
      RUSTFS_USE_SSL: ${RUSTFS_USE_SSL:-false}

      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-this-in-production}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY:-24h}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-168h}
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - clipshare
    command: >
      sh -c "
        /app/migrate up &&
        /app/server
      "

volumes:
  postgres_data:
  rustfs_data:
  rustfs_logs:

networks:
  clipshare:
    driver: bridge
