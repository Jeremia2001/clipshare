name: Build Desktop (Windows)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/frontend/package-lock.json

      - name: Install NSIS
        run: choco install nsis --yes

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        working-directory: apps/desktop/frontend
        run: npm ci

      - name: Generate Wails bindings
        run: wails generate module

      - name: Build frontend
        working-directory: apps/desktop/frontend
        run: npm run build

      - name: Build
        run: wails build -platform windows/amd64 -nsis -s

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_name }}"
          name: "ClipShare Desktop ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            apps/desktop/build/bin/clipshare-desktop.exe
            apps/desktop/build/bin/clipshare-desktop-amd64-installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
